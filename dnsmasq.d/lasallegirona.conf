interface=wlan0
bind-interfaces

# DHCP
dhcp-range=10.10.0.10,10.10.0.200,12h
dhcp-option=3,10.10.0.1
dhcp-option=6,10.10.0.1

#DNS EXTERNOS:
listen-address=10.10.0.1
server=1.1.1.1
server=8.8.8.8

# DNS CAPTIVE PORTAL
# address=/#/10.10.0.1
address=/lasallegirona.sallenet.net/10.10.0.1

# ESTABLILIDAD DE DNS
no-poll
domain-needed
bogus-priv
no-resolv
local-service

log-queries
log-facility=/var/log/dnsmasq.log
